server.port=8080
spring.application.name=mcp-git-integration
app.version=0.0.1-SNAPSHOT

# -------------------------------------------------------
# Test Database Configuration
# -------------------------------------------------------

# H2 in-memory DB (replaces MySQL for tests)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Disable MongoDB auto-configuration for tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration

# -------------------------------------------------------
# Actuator Configuration (same as main)
# -------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always
management.metrics.tags.application=mcp-git-integration
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.metrics.distribution.maximum-expected-value.http.server.requests=5s
management.metrics.distribution.percentiles-histogram.http.server.requests=true
