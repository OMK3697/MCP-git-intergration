server.port=8080
spring.application.name=mcp-git-integration
app.version=0.0.1-SNAPSHOT

# -------------------------------------------------------
# MySQL Configuration (KAN-2)
# -------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/mcp_git_integration
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.maximum-pool-size=5

# -------------------------------------------------------
# MongoDB Configuration (KAN-2)
# -------------------------------------------------------
spring.data.mongodb.uri=mongodb://localhost:27017/mcp_git_integration

# -------------------------------------------------------
# Actuator & Metrics Configuration (KAN-1)
# -------------------------------------------------------

# Expose actuator endpoints: health, info, metrics, prometheus
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# Explicitly enable the Prometheus endpoint
management.endpoint.prometheus.enabled=true

# Show full health details (disk space, components, etc.)
management.endpoint.health.show-details=always

# Tag every metric with the application name for multi-app dashboards
management.metrics.tags.application=mcp-git-integration

# -------------------------------------------------------
# HTTP Request Metrics – Percentiles & Histograms
# -------------------------------------------------------

# Track p50, p95, p99 latency for HTTP server requests
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99

# Cap expected max response time at 5 seconds
management.metrics.distribution.maximum-expected-value.http.server.requests=5s

# Enable percentile histograms for Prometheus scraping
management.metrics.distribution.percentiles-histogram.http.server.requests=true
